<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Halal Screener" />
  <title>Halal Stock Screener</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #0a1628; --bg2: #0f1e38; --bg3: #152440;
      --gold:   #c9a84c; --gold2: #e8c96a;
      --green:  #2ecc71; --red: #e74c3c; --orange: #f39c12;
      --muted:  #4a6080; --text: #d4e0f0; --text2: #8aa8cc;
      --border: rgba(201,168,76,0.15); --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(60deg, transparent, transparent 40px, rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px), repeating-linear-gradient(-60deg, transparent, transparent 40px, rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px); pointer-events: none; z-index: 0; }
    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

    .header { padding: 48px 20px 24px; text-align: center; border-bottom: 1px solid var(--border); }
    .header .bismillah { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; margin-bottom: 12px; opacity: 0.85; }
    .header h1 { font-family: 'Amiri', serif; font-size: 28px; font-weight: 700; color: var(--gold2); letter-spacing: 1px; }
    .header .subtitle { font-size: 10px; color: var(--text2); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
    .last-updated { display: inline-block; margin-top: 12px; font-size: 10px; color: var(--muted); background: var(--bg3); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px 16px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 10px; text-align: center; animation: fadeUp 0.4s ease both; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; } .stat-card:nth-child(3) { animation-delay: 0.2s; }
    .stat-card .num { font-size: 28px; font-weight: 500; color: var(--gold2); line-height: 1; }
    .stat-card .num.green { color: var(--green); } .stat-card .num.red { color: var(--red); }
    .stat-card .label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

    .tabs { display: flex; gap: 6px; padding: 0 16px 16px; }
    .tab { flex: 1; padding: 8px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 500; }

    .section { padding: 0 16px; }
    .section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .stock-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; animation: fadeUp 0.3s ease both; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
    .stock-card:active { transform: scale(0.98); } .stock-card:hover { border-color: rgba(201,168,76,0.4); }
    .stock-card.passed { border-left: 3px solid var(--green); } .stock-card.failed { border-left: 3px solid var(--muted); }

    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
    .card-header .symbol { font-size: 16px; font-weight: 500; color: var(--gold2); letter-spacing: 1px; }
    .badge { font-size: 9px; padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
    .badge.pass { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
    .badge.fail { background: rgba(74,96,128,0.2); color: var(--muted); border: 1px solid rgba(74,96,128,0.3); }

    .score-bar { padding: 6px 16px 10px; display: flex; align-items: center; gap: 10px; }
    .score-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .score-num { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; }
    .verdict-text { font-size: 10px; color: var(--text2); }

    .card-metrics { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); }
    .metric { padding: 10px 8px; text-align: center; border-right: 1px solid var(--border); }
    .metric:last-child { border-right: none; }
    .metric .val { font-size: 12px; font-weight: 500; }
    .metric .val.good { color: var(--green); } .metric .val.bad { color: var(--red); } .metric .val.na { color: var(--muted); }
    .metric .key { font-size: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto 20px; }
    .modal-symbol { font-family: 'Amiri', serif; font-size: 32px; color: var(--gold2); margin-bottom: 4px; }
    .modal-price { font-size: 20px; color: var(--text); margin-bottom: 16px; }

    .big-score { text-align: center; padding: 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .big-score .s-num { font-size: 52px; font-weight: 500; line-height: 1; }
    .big-score .s-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
    .big-score .s-verdict { font-family: 'Amiri', serif; font-size: 22px; margin-top: 8px; }

    .score-breakdown { margin-bottom: 16px; }
    .sb-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .sb-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sb-row:last-child { border-bottom: none; }
    .sb-label { font-size: 11px; color: var(--text2); flex: 1; }
    .sb-track { width: 80px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .sb-fill { height: 100%; border-radius: 2px; }
    .sb-pts { font-size: 11px; color: var(--text); min-width: 40px; text-align: right; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .detail-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .detail-item .d-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 6px; }
    .detail-item .d-val { font-size: 17px; font-weight: 500; }
    .detail-item .d-val.good { color: var(--green); } .detail-item .d-val.bad { color: var(--red); } .detail-item .d-val.na { color: var(--muted); font-size: 13px; }
    .detail-item .d-status { font-size: 9px; margin-top: 4px; color: var(--muted); }

    .filter-checks { margin-bottom: 16px; }
    .fc-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .check-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .check-row:last-child { border-bottom: none; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text2); }
    .loading .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    .loading p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 12px; }
    .error-banner { margin: 0 16px 16px; padding: 12px 16px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: var(--radius); font-size: 11px; color: #e74c3c; display: none; line-height: 1.6; }
    .refresh-btn { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; background: var(--gold); border: none; border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,168,76,0.4); z-index: 50; transition: transform 0.3s; }
    .refresh-btn:active { transform: scale(0.9) rotate(180deg); }
    .close-modal { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="bismillah">بِسْمِ اللهِ</div>
    <h1>Halal Stock Screener</h1>
    <div class="subtitle">NSE · Shariah Compliant</div>
    <div class="last-updated" id="lastUpdated">Loading...</div>
  </div>

  <div class="summary">
    <div class="stat-card"><div class="num" id="totalScreened">—</div><div class="label">Screened</div></div>
    <div class="stat-card"><div class="num green" id="totalPassed">—</div><div class="label">Passed</div></div>
    <div class="stat-card"><div class="num red" id="totalFailed">—</div><div class="label">Filtered</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('passed')">✅ Passed</button>
    <button class="tab" onclick="switchTab('all')">📋 All Stocks</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="section">
    <div class="section-title" id="sectionTitle">Qualifying Stocks</div>
    <div id="stockList"><div class="loading"><div class="spinner"></div><p>Loading from Google Sheets</p></div></div>
  </div>
</div>

<button class="refresh-btn" onclick="loadData()">↻</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="close-modal" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const SHEET_ID  = '1VEt5UTJi8owOFA5fbmZd42a7n59sanOVPDLIscLe4Kw';
const SHEET_TAB = 'Fundamentals';
let allStocks = [], currentTab = 'passed';

async function loadData() {
  document.getElementById('stockList').innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching latest data</p></div>';
  document.getElementById('errorBanner').style.display = 'none';
  try {
    const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;
    const text = await (await fetch(url)).text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const cols = json.table.cols.map(c => c.label);
    allStocks  = json.table.rows.slice(1).map(row => {
      const obj = {}; cols.forEach((col, i) => { obj[col] = row.c?.[i]?.v ?? null; }); return obj;
    }).filter(s => s['Symbol']);

    const passed = allStocks.filter(isPassed);
    document.getElementById('totalScreened').textContent = allStocks.length;
    document.getElementById('totalPassed').textContent   = passed.length;
    document.getElementById('totalFailed').textContent   = allStocks.length - passed.length;
    const ts = allStocks.map(s => s['Timestamp']).filter(Boolean).sort().reverse()[0];
    if (ts) document.getElementById('lastUpdated').textContent = `Updated: ${ts}`;
    renderList();
  } catch (err) {
    document.getElementById('errorBanner').textContent = 'Could not load data. Make sure your Google Sheet is public: Share → Anyone with the link → Viewer.';
    document.getElementById('errorBanner').style.display = 'block';
    document.getElementById('stockList').innerHTML = '';
  }
}

function isPassed(s) { const v = s['All Pass']; return v === true || v === 'TRUE' || v === 'True'; }

function scoreColor(score) {
  if (score >= 80) return '#c9a84c';
  if (score >= 60) return '#2ecc71';
  if (score >= 40) return '#f39c12';
  return '#e74c3c';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='passed')||(i===1&&tab==='all')));
  renderList();
}

function renderList() {
  let stocks = currentTab === 'passed' ? allStocks.filter(isPassed) : [...allStocks];
  stocks.sort((a, b) => (b['Score /100'] ?? 0) - (a['Score /100'] ?? 0));
  document.getElementById('sectionTitle').textContent = currentTab === 'passed' ? 'Qualifying Stocks' : 'All Screened Stocks';

  if (!stocks.length) { document.getElementById('stockList').innerHTML = '<div class="empty">No stocks match this view</div>'; return; }

  document.getElementById('stockList').innerHTML = stocks.map((s, i) => {
    const passed = isPassed(s);
    const score  = s['Score /100'] ?? 0;
    const color  = scoreColor(score);
    const drop   = s['% Below High'] ? parseFloat(s['% Below High']) : null;
    const de     = s['D/E Ratio'];
    const roe    = s['ROE (%)'];
    const rsi    = s['RSI'];

    return `<div class="stock-card ${passed?'passed':'failed'}" style="animation-delay:${i*0.04}s" onclick='openModal(${JSON.stringify(s)})'>
      <div class="card-header">
        <div><div class="symbol">${s['Symbol']}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">₹${s['Current Price (₹)']??'—'}</div></div>
        <span class="badge ${passed?'pass':'fail'}">${passed?'Pass':'Review'}</span>
      </div>
      <div class="score-bar">
        <div class="score-track"><div class="score-fill" style="width:${score}%;background:${color}"></div></div>
        <div class="score-num" style="color:${color}">${score}</div>
        <div class="verdict-text">${s['Verdict']||''}</div>
      </div>
      <div class="card-metrics">
        <div class="metric"><div class="val ${drop!=null?(drop>=20?'good':'bad'):'na'}">${drop!=null?drop.toFixed(1)+'%':'—'}</div><div class="key">Below High</div></div>
        <div class="metric"><div class="val ${de!=null?(de<=0.33?'good':'bad'):'na'}">${de!=null?de.toFixed(2):'—'}</div><div class="key">D/E</div></div>
        <div class="metric"><div class="val ${roe!=null?(roe>=15?'good':'bad'):'na'}">${roe!=null?roe.toFixed(1)+'%':'—'}</div><div class="key">ROE</div></div>
        <div class="metric"><div class="val ${rsi!=null?(rsi<=50?'good':rsi<=65?'na':'bad'):'na'}">${rsi!=null?rsi.toFixed(0):'—'}</div><div class="key">RSI</div></div>
      </div>
    </div>`;
  }).join('');
}

function openModal(s) {
  const score   = s['Score /100'] ?? 0;
  const color   = scoreColor(score);
  const pPrice  = ['true','TRUE','True',true].includes(s['Pass Price']);
  const pDE     = ['true','TRUE','True',true].includes(s['Pass D/E']);
  const pRev    = ['true','TRUE','True',true].includes(s['Pass Revenue']);
  const pPE     = ['true','TRUE','True',true].includes(s['Pass PE']);

  const scoreItems = [
    ['PE Discount',    s['Score PE']??0,      25],
    ['ROE Quality',    s['Score ROE']??0,     20],
    ['Free Cash Flow', s['Score FCF']??0,     20],
    ['D/E Ratio',      s['Score D/E']??0,     15],
    ['Revenue Growth', s['Score Revenue']??0, 10],
    ['RSI Timing',     s['Score RSI']??0,     10],
  ];

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-symbol">${s['Symbol']}</div>
    <div class="modal-price">₹${s['Current Price (₹)']??'—'} <span style="font-size:13px;color:var(--text2);margin-left:8px">52W High ₹${s['52W High (₹)']??'—'}</span></div>
    <div class="big-score">
      <div class="s-num" style="color:${color}">${score}</div>
      <div class="s-label">Score out of 100</div>
      <div class="s-verdict">${s['Verdict']||'—'}</div>
    </div>
    <div class="score-breakdown">
      <div class="sb-title">Score Breakdown</div>
      ${scoreItems.map(([label,pts,max])=>`
        <div class="sb-row">
          <div class="sb-label">${label}</div>
          <div class="sb-track"><div class="sb-fill" style="width:${(pts/max)*100}%;background:${scoreColor((pts/max)*100)}"></div></div>
          <div class="sb-pts">${pts}/${max}</div>
        </div>`).join('')}
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="d-label">% Below 52W High</div><div class="d-val ${pPrice?'good':'bad'}">${s['% Below High']??'—'}</div><div class="d-status">Need ≥ 20%</div></div>
      <div class="detail-item"><div class="d-label">D/E Ratio</div><div class="d-val ${pDE?'good':s['D/E Ratio']==null?'na':'bad'}">${s['D/E Ratio']!=null?s['D/E Ratio'].toFixed(3):'N/A'}</div><div class="d-status">Need &lt; 0.33</div></div>
      <div class="detail-item"><div class="d-label">ROE</div><div class="d-val ${s['ROE (%)']!=null?(s['ROE (%)']>=15?'good':'bad'):'na'}">${s['ROE (%)']!=null?s['ROE (%)'].toFixed(1)+'%':'N/A'}</div><div class="d-status">Need ≥ 15%</div></div>
      <div class="detail-item"><div class="d-label">Free Cash Flow</div><div class="d-val ${s['FCF (₹ Cr)']!=null?(s['FCF (₹ Cr)']>0?'good':'bad'):'na'}">${s['FCF (₹ Cr)']!=null?'₹'+Number(s['FCF (₹ Cr)']).toLocaleString()+'Cr':'N/A'}</div><div class="d-status">Need &gt; 0</div></div>
      <div class="detail-item"><div class="d-label">PE Discount</div><div class="d-val ${pPE?'good':s['PE Discount (%)']==null?'na':'bad'}">${s['PE Discount (%)']!=null?s['PE Discount (%)'].toFixed(1)+'%':'N/A'}</div><div class="d-status">PE ${s['PE Current']??'—'} vs 5yr avg ${s['PE 5yr Avg']??'—'}</div></div>
      <div class="detail-item"><div class="d-label">RSI</div><div class="d-val ${s['RSI']!=null?(s['RSI']<=40?'good':s['RSI']<=60?'na':'bad'):'na'}">${s['RSI']!=null?s['RSI'].toFixed(1):'N/A'}</div><div class="d-status">≤ 40 = good entry</div></div>
    </div>
    <div class="filter-checks">
      <div class="fc-title">Filter Checklist</div>
      ${[['Price ≥ 20% below 52W high',pPrice],['Debt/Equity < 0.33',pDE],['Revenue growth positive',pRev],['PE ≥ 20% below 5yr average',pPE]]
        .map(([label,pass])=>`<div class="check-row"><span>${label}</span><span>${pass?'✅':'❌'}</span></div>`).join('')}
    </div>
    <div style="text-align:center;font-size:10px;color:var(--muted);line-height:1.9">
      Market Cap: ₹${s['Market Cap (₹ Cr)']!=null?Number(s['Market Cap (₹ Cr)']).toLocaleString():'—'} Cr &nbsp;|&nbsp; Rev Growth: ${s['Revenue Growth (%)']!=null?s['Revenue Growth (%)'].toFixed(1)+'%':'—'}<br>
      Last screened: ${s['Timestamp']??'—'}<br>☪️ Shariah-verified · Curated halal list
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }

loadData();
</script>
</body>
</html>
